services:
  vprodb:
    build:
      context: ./Docker-files/db
    image: henexcontainers/henexdb
    container_name: henexdb
    ports:
      - "3306:3306"
    volumes:
      - vprodbdata:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=vprodbpass

  vprocache01:
    image: memcached
    container_name: henexcache01
    ports:
      - "11211:11211"

  vpromq01:
    image: rabbitmq
    container_name: henexmq01
    ports:
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  vproapp:
    build: 
      context: ./Docker-files/app
    image: henexcontainers/henexapp
    container_name: henexapp
    ports:
      - "8080:8080"
    volumes:
      - vproappdata:/usr/local/tomcat/webapps
    
  vproweb:
    build:
      context: ./Docker-files/web
    image: henexcontainers/henexweb
    container_name: henexweb
    ports:
      - "80:80"

volumes:
   vprodbdata: {}
   vproappdata: {}